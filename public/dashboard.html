<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Restaurant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 24px;
    }
    h1 { color: #333; margin-bottom: 24px; text-align: center; }
    .btn {
      padding: 14px 28px;
      background: #e53935;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      display: block;
      margin: 0 auto 24px;
    }
    .btn:hover { background: #c62828; }
    table {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    th {
      background: #333;
      color: white;
      padding: 12px;
      text-align: left;
    }
    td { padding: 12px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    .empty { text-align: center; color: #999; padding: 24px; }
  </style>
</head>
<body>
  <h1>🍽️ Dashboard Restaurant</h1>
  <button class="btn" onclick="tableLibre()">✅ Table libre — Notifier le prochain</button>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Nom</th>
        <th>Téléphone</th>
      </tr>
    </thead>
    <tbody id="waitlist-body">
      <tr><td colspan="3" class="empty">Chargement...</td></tr>
    </tbody>
  </table>

  <script>
    const RESTAURANT_ID = 'restaurant1';

    async function loadWaitlist() {
      const res = await fetch(`https://waitlist-app-s8lr.onrender.com/waitlist/${RESTAURANT_ID}`);
      const data = await res.json();
      const tbody = document.getElementById('waitlist-body');

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">Pas de clients en attente</td></tr>';
        return;
      }

      tbody.innerHTML = data.map((c, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${c.name}</td>
          <td>${c.phone}</td>
        </tr>
      `).join('');
    }

    async function tableLibre() {
      const res = await fetch('https://waitlist-app-s8lr.onrender.com/table-free', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ restaurantId: RESTAURANT_ID })
      });
      const data = await res.json();
      if (data.success) {
        alert(`✅ ${data.notified.name} a été notifié !`);
        loadWaitlist();
      } else {
        alert('Pas de clients en attente');
      }
    }

    loadWaitlist();
    setInterval(loadWaitlist, 5000);
  </script>
</body>
</html>
