<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Restaurant</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      padding: 40px 24px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo { font-size: 36px; margin-bottom: 8px; }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #d4af37;
      font-size: 32px;
      letter-spacing: 1px;
    }
    .subtitle {
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }
    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
      margin: 16px auto;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 12px;
      padding: 20px 32px;
      text-align: center;
    }
    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: #d4af37;
    }
    .stat-label {
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .btn {
      display: block;
      margin: 0 auto 40px;
      padding: 16px 40px;
      background: linear-gradient(135deg, #d4af37, #f0d060, #d4af37);
      background-size: 200% auto;
      color: #0a0a0a;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(212,175,55,0.3);
    }
    .table-container {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(212,175,55,0.15);
      border-radius: 16px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: rgba(212,175,55,0.1);
      color: #d4af37;
      padding: 16px 20px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
    }
    td {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.8);
      font-size: 14px;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(212,175,55,0.03); }
    .position {
      color: #d4af37;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
    }
    .empty {
      text-align: center;
      color: rgba(255,255,255,0.2);
      padding: 48px;
      font-size: 14px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🍽️</div>
    <h1>Dashboard Restaurant</h1>
    <p class="subtitle">Gestion de la file d'attente</p>
    <div class="divider"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="count">0</div>
      <div class="stat-label">En attente</div>
    </div>
  </div>

  <button class="btn" onclick="tableLibre()">✅ Table libre — Notifier le prochain</button>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nom</th>
          <th>Téléphone</th>
        </tr>
      </thead>
      <tbody id="waitlist-body">
        <tr><td colspan="3" class="empty">Chargement...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const RESTAURANT_ID = 'restaurant1';

    async function loadWaitlist() {
      const res = await fetch(`https://waitlist-app-s8lr.onrender.com/waitlist/${RESTAURANT_ID}`);
      const data = await res.json();
      const tbody = document.getElementById('waitlist-body');
      document.getElementById('count').textContent = data.length;

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">Aucun client en attente</td></tr>';
        return;
      }

      tbody.innerHTML = data.map((c, i) => `
        <tr>
          <td class="position">${i + 1}</td>
          <td>${c.name}</td>
          <td>${c.phone}</td>
        </tr>
      `).join('');
    }

    async function tableLibre() {
      const res = await fetch('https://waitlist-app-s8lr.onrender.com/table-free', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ restaurantId: RESTAURANT_ID })
      });
      const data = await res.json();
      if (data.success) {
        alert(`✅ ${data.notified.name} a été notifié !`);
        loadWaitlist();
      } else {
        alert('Pas de clients en attente');
      }
    }

    loadWaitlist();
    setInterval(loadWaitlist, 5000);
  </script>
</body>
</html>
