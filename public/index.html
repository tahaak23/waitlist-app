<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File d'attente</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%);
      bottom: -50px;
      left: -50px;
      border-radius: 50%;
    }
    .card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 24px;
      padding: 48px 40px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .logo {
      font-size: 32px;
      margin-bottom: 8px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #d4af37;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      font-weight: 300;
      margin-bottom: 36px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
      margin: 0 auto 32px;
    }
    input {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 10px;
      font-size: 15px;
      color: white;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: rgba(212,175,55,0.6);
    }
    input::placeholder { color: rgba(255,255,255,0.3); }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #d4af37, #f0d060, #d4af37);
      background-size: 200% auto;
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }
    button:hover {
      background-position: right center;
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(212,175,55,0.3);
    }
    .result {
      margin-top: 24px;
      padding: 16px;
      background: rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 10px;
      color: #d4af37;
      font-size: 14px;
      display: none;
      line-height: 1.6;
    }
    .footer {
      margin-top: 32px;
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍽️</div>
    <h1>Liste d'attente</h1>
    <p class="subtitle">Réservez votre place</p>
    <div class="divider"></div>
    <input type="text" id="name" placeholder="Votre nom" />
    <input type="tel" id="phone" placeholder="Numéro WhatsApp (ex: 0612345678)" />
    <button onclick="joinWaitlist()">Rejoindre la file</button>
    <div class="result" id="result"></div>
    <p class="footer">Vous serez notifié par WhatsApp</p>
  </div>

  <script>
    async function joinWaitlist() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;

      if (!name || !phone) {
        alert('Veuillez remplir tous les champs');
        return;
      }

      try {
        const response = await fetch('https://waitlist-app-s8lr.onrender.com/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, restaurantId: 'restaurant1' })
        });

        const data = await response.json();
        const result = document.getElementById('result');
        result.style.display = 'block';
        result.innerHTML = `✅ ${data.message}<br><small>Vous recevrez un message WhatsApp quand votre table est prête</small>`;
      } catch (err) {
        alert('Erreur: ' + err.message);
      }
    }
  </script>
</body>
</html>
