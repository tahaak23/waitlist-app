<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste d'attente</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #1ebe57; }
    .result {
      margin-top: 20px;
      padding: 16px;
      background: #e8f5e9;
      border-radius: 8px;
      color: #2e7d32;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🍽️ Liste d'attente</h1>
    <p>Entrez vos informations pour réserver votre place</p>
    <input type="text" id="name" placeholder="Votre nom" />
    <input type="tel" id="phone" placeholder="Votre numéro WhatsApp (ex: +212612345678)" />
    <button onclick="joinWaitlist()">Rejoindre la file d'attente</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    async function joinWaitlist() {
  const name = document.getElementById('name').value;
  const phone = document.getElementById('phone').value;

  if (!name || !phone) {
    alert('Veuillez remplir tous les champs');
    return;
  }

  try {
    const response = await fetch('https://waitlist-app-s8lr.onrender.com/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, phone, restaurantId: 'restaurant1' })
    });

    const data = await response.json();
    const result = document.getElementById('result');
    result.style.display = 'block';
    result.innerHTML = `✅ ${data.message} — Vous recevrez un message WhatsApp quand votre table est prête !`;
  } catch (err) {
    alert('Erreur: ' + err.message);
  }
}
</script>
</body>
</html>
