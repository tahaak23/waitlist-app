<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Boca Negra</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .bg-lines {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
    }

    .card {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2px;
      padding: 56px 48px;
      width: 90%;
      max-width: 440px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: -8px;
      bottom: -8px;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 2px;
      z-index: -1;
    }

    .logo-circle {
      width: 140px;
      height: 140px;
      background: #fff;
      border-radius: 50%;
      margin: 0 auto 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .logo-circle::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      color: #000;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-align: center;
      padding: 0 12px;
      line-height: 1.4;
    }

    .logo-sub {
      color: rgba(0,0,0,0.5);
      font-size: 6px;
      letter-spacing: 2px;
      text-align: center;
      margin-top: 6px;
      padding: 0 12px;
      text-transform: uppercase;
    }

    .tagline {
      color: rgba(255,255,255,0.2);
      font-size: 10px;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 40px;
      font-weight: 200;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .divider-diamond {
      width: 6px;
      height: 6px;
      background: white;
      transform: rotate(45deg);
      opacity: 0.4;
    }

    input, select {
      width: 100%;
      padding: 14px 20px;
      margin-bottom: 12px;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      transition: border-color 0.3s;
      letter-spacing: 1px;
      border-radius: 0;
    }

    select option { background: #111; color: white; }

    input:focus, select:focus {
      outline: none;
      border-bottom-color: white;
    }

    input::placeholder { 
      color: rgba(255,255,255,0.25);
      font-weight: 200;
      letter-spacing: 2px;
      font-size: 12px;
    }

    select {
      appearance: none;
      cursor: pointer;
    }

    .select-wrapper {
      position: relative;
      margin-bottom: 12px;
    }

    .select-wrapper::after {
      content: '∨';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      pointer-events: none;
      font-size: 12px;
    }

    .select-wrapper select {
      margin-bottom: 0;
      width: 100%;
    }

    .btn-wrapper {
      margin-top: 32px;
      position: relative;
    }

    button {
      width: 100%;
      padding: 16px;
      background: white;
      color: #000;
      border: none;
      border-radius: 0;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: all 0.4s;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: #000;
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    button:hover::after { transform: translateX(0); }

    button span {
      position: relative;
      z-index: 1;
      transition: color 0.4s;
    }

    button:hover span { color: white; }

    .result {
      margin-top: 24px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      display: none;
      line-height: 1.8;
      letter-spacing: 1px;
      font-weight: 300;
    }

    .footer {
      margin-top: 40px;
      color: rgba(255,255,255,0.1);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="bg-lines"></div>
  <div class="bg-glow"></div>

  <div class="card">
    <div class="logo-circle">
      <div class="logo-text">LA BOCA<br>NEGRA</div>
      <div class="logo-sub">Italian Spanish Restaurant</div>
    </div>

    <p class="tagline">Réservez votre place</p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <input type="text" id="name" placeholder="Votre nom" />
    <input type="tel" id="phone" placeholder="Numéro WhatsApp" />
    
    <div class="select-wrapper">
      <select id="persons">
        <option value="" disabled selected>Nombre de personnes</option>
        <option value="1">1 personne</option>
        <option value="2">2 personnes</option>
        <option value="3">3 personnes</option>
        <option value="4">4 personnes</option>
        <option value="5">5 personnes</option>
        <option value="6">6 personnes</option>
        <option value="7">7 personnes</option>
       <option value="8">8 personnes</option>
<option value="9">9+ personnes</option>
      </select>
    </div>

    <div class="btn-wrapper">
      <button onclick="joinWaitlist()"><span>Rejoindre la file</span></button>
    </div>

    <div class="result" id="result"></div>
    <a href="/menu.html" style="display:block;margin-top:24px;color:rgba(255,255,255,0.3);font-size:10px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:4px;width:fit-content;margin-left:auto;margin-right:auto">Voir le menu →</a>
<p class="footer" style="margin-top:16px">Notification par WhatsApp</p>
  </div>

  <script>
    async function joinWaitlist() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const persons = document.getElementById('persons').value;

      if (!name || !phone || !persons) {
        alert('Veuillez remplir tous les champs');
        return;
      }

      try {
        const response = await fetch('https://waitlist-app-s8lr.onrender.com/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, persons, restaurantId: 'restaurant1' })
        });

        const data = await response.json();
        const result = document.getElementById('result');
        result.style.display = 'block';
        result.innerHTML = `✦ ${data.message}<br><small style="opacity:0.5;font-size:11px;letter-spacing:2px">NOTIFICATION WHATSAPP À L'ARRIVÉE</small>`;
      } catch (err) {
        alert('Erreur: ' + err.message);
      }
    }
  </script>
</body>
</html>
