<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Boca Negra</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
    .bg-lines { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 60px 60px; }
    .bg-glow { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; }
    .card { background: rgba(255,255,255,0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2px; padding: 56px 48px; width: 90%; max-width: 440px; text-align: center; position: relative; z-index: 1; }
    .card::before { content: ''; position: absolute; top: 8px; left: 8px; right: -8px; bottom: -8px; border: 1px solid rgba(255,255,255,0.04); border-radius: 2px; z-index: -1; }
    .logo-circle { width: 140px; height: 140px; background: #fff; border-radius: 50%; margin: 0 auto 32px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
    .logo-circle::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
    .logo-text { font-family: 'Playfair Display', serif; color: #000; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-align: center; padding: 0 12px; line-height: 1.4; }
    .logo-sub { color: rgba(0,0,0,0.5); font-size: 6px; letter-spacing: 2px; text-align: center; margin-top: 6px; padding: 0 12px; text-transform: uppercase; }
    .tagline { color: rgba(255,255,255,0.55); font-size: 10px; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 40px; font-weight: 300; }
    .divider { display: flex; align-items: center; gap: 16px; margin-bottom: 36px; }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.15); }
    .divider-diamond { width: 6px; height: 6px; background: white; transform: rotate(45deg); opacity: 0.5; }
    input, select { width: 100%; padding: 14px 20px; margin-bottom: 12px; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); font-size: 14px; color: white; font-family: 'Inter', sans-serif; font-weight: 300; letter-spacing: 1px; transition: border-color 0.3s; border-radius: 0; }
    select option { background: #111; color: white; }
    input:focus, select:focus { outline: none; border-bottom-color: white; }
    input::placeholder { color: rgba(255,255,255,0.35); font-weight: 200; letter-spacing: 2px; font-size: 12px; }
    select { appearance: none; cursor: pointer; }
    .select-wrapper { position: relative; margin-bottom: 12px; }
    .select-wrapper::after { content: '∨'; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); pointer-events: none; font-size: 12px; }
    .select-wrapper select { margin-bottom: 0; width: 100%; }
    .phone-row { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.2); transition: border-color 0.3s; }
    .phone-row:focus-within { border-bottom-color: white; }
    .phone-row select { width: 110px; flex-shrink: 0; border-bottom: none; margin-bottom: 0; font-size: 12px; padding: 14px 8px; border-right: 1px solid rgba(255,255,255,0.15); }
    .phone-row input { flex: 1; border-bottom: none; margin-bottom: 0; padding-left: 16px; }
    .btn-wrapper { margin-top: 32px; position: relative; }
    button { width: 100%; padding: 16px; background: white; color: #000; border: none; border-radius: 0; font-size: 11px; font-weight: 500; cursor: pointer; letter-spacing: 4px; text-transform: uppercase; transition: all 0.4s; font-family: 'Inter', sans-serif; position: relative; overflow: hidden; }
    button::after { content: ''; position: absolute; inset: 0; background: #000; transform: translateX(-100%); transition: transform 0.4s; }
    button:hover::after { transform: translateX(0); }
    button span { position: relative; z-index: 1; transition: color 0.4s; }
    button:hover span { color: white; }
    .result { margin-top: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.9); font-size: 13px; display: none; line-height: 1.8; letter-spacing: 1px; font-weight: 300; }
    .whatsapp-btn { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 16px; padding: 14px 20px; background: #25D366; color: white; border: none; border-radius: 0; cursor: pointer; font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; font-family: 'Inter', sans-serif; text-decoration: none; width: 100%; }
    .whatsapp-btn:hover { background: #1ebe5d; }
    .whatsapp-btn svg { width: 18px; height: 18px; fill: white; flex-shrink: 0; }
    .menu-link { display: block; margin-top: 24px; color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 4px; width: fit-content; margin-left: auto; margin-right: auto; transition: color 0.3s; }
    .menu-link:hover { color: white; }
    .footer { margin-top: 16px; color: rgba(255,255,255,0.4); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="bg-lines"></div>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="logo-circle">
      <div class="logo-text">LA BOCA<br>NEGRA</div>
      <div class="logo-sub">Italian Spanish Restaurant</div>
    </div>
    <p class="tagline">Réservez votre place</p>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
    <input type="text" id="name" placeholder="Votre nom" />
    <div class="phone-row">
      <select id="country-code">
        <option value="+212">🇲🇦 +212</option>
        <option value="+33">🇫🇷 +33</option>
        <option value="+34">🇪🇸 +34</option>
        <option value="+31">🇳🇱 +31</option>
        <option value="+32">🇧🇪 +32</option>
        <option value="+39">🇮🇹 +39</option>
        <option value="+44">🇬🇧 +44</option>
        <option value="+49">🇩🇪 +49</option>
        <option value="+1">🇺🇸 +1</option>
        <option value="+966">🇸🇦 +966</option>
        <option value="+971">🇦🇪 +971</option>
        <option value="+216">🇹🇳 +216</option>
        <option value="+213">🇩🇿 +213</option>
      </select>
      <input type="tel" id="phone" placeholder="Numéro WhatsApp" />
    </div>
    <div class="select-wrapper">
      <select id="persons">
        <option value="" disabled selected>Nombre de personnes</option>
        <option value="1">1 personne</option>
        <option value="2">2 personnes</option>
        <option value="3">3 personnes</option>
        <option value="4">4 personnes</option>
        <option value="5">5 personnes</option>
        <option value="6">6 personnes</option>
        <option value="7">7 personnes</option>
        <option value="8">8 personnes</option>
        <option value="9">9+ personnes</option>
      </select>
    </div>
    <div class="btn-wrapper">
      <button onclick="joinWaitlist()"><span>Rejoindre la file</span></button>
    </div>
    <div class="result" id="result"></div>
    <div id="whatsapp-section" style="display:none">
      <a id="whatsapp-link" href="#" target="_blank" class="whatsapp-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Activer ma notification WhatsApp
      </a>
    </div>
    <a href="/menu.html" class="menu-link">Voir le menu →</a>
    <p class="footer">Notification par WhatsApp</p>
  </div>
  <script>
    async function joinWaitlist() {
      const name = document.getElementById('name').value;
      const countryCode = document.getElementById('country-code').value;
      const phoneRaw = document.getElementById('phone').value.trim();
      const persons = document.getElementById('persons').value;
      if (!name || !phoneRaw || !persons) { alert('Veuillez remplir tous les champs'); return; }
      let phone = phoneRaw;
      if (countryCode === '+212') { if (phone.startsWith('0')) phone = phone.slice(1); phone = countryCode + phone; } else { phone = countryCode + phone; }
      try {
        const response = await fetch('https://waitlist-app-s8lr.onrender.com/join', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, phone, persons, restaurantId: 'restaurant1' }) });
        const data = await response.json();
        const result = document.getElementById('result');
        result.style.display = 'block';
        result.innerHTML = `✦ ${data.message}<br><small style="opacity:0.6;font-size:11px;letter-spacing:2px">NOTIFICATION WHATSAPP À L'ARRIVÉE</small>`;
        const waSection = document.getElementById('whatsapp-section');
        const waLink = document.getElementById('whatsapp-link');
        const waMessage = encodeURIComponent(`Bonjour, je viens de rejoindre la file d'attente de La Boca Negra. Mon nom est ${name}.`);
        waLink.href = `https://wa.me/212620442160?text=${waMessage}`;
        waSection.style.display = 'block';
      } catch (err) { alert('Erreur: ' + err.message); }
    }
  </script>
</body>
</html>
